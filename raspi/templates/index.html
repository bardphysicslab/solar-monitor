<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #050505;
        --panel: #111111;
        --panel-border: #2f2f2f;
        --text: #f5f5f5;
        --muted: #a7a7a7;
        --accent: #58a6ff;
        --accent-2: #52d273;
        --danger: #c9232d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 20px 40px;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 0;
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .header-left img {
        height: 52px;
        width: auto;
      }

      .header-title {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-right {
        display: grid;
        justify-items: end;
        gap: 8px;
      }

      .clock {
        white-space: nowrap;
        text-align: right;
        font-size: 17px;
        color: rgba(255, 255, 255, 0.86);
      }

      .clock-utc {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      button {
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px 16px;
        color: var(--text);
        background: #171717;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        border-color: rgba(255, 255, 255, 0.35);
      }

      .button-start {
        background: var(--danger);
        border-color: var(--danger);
      }

      .status {
        min-width: 88px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 14px;
        font-weight: 700;
        text-align: right;
      }

      .status-running {
        color: var(--accent-2);
      }

      .status-stopped {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .chart-panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 20px;
      }

      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 14px;
      }

      .chart-title {
        margin: 0;
        font-size: 20px;
      }

      .reading {
        color: var(--muted);
        font-size: 15px;
        white-space: nowrap;
      }

      .chart-wrap {
        position: relative;
        height: 300px;
      }

      .time-card {
        display: flex;
        min-height: 300px;
        flex-direction: column;
      }

      .time-body {
        display: grid;
        flex: 1;
        align-content: center;
        justify-items: center;
        gap: 10px;
        text-align: center;
      }

      .unit-time {
        font-size: 36px;
        font-weight: 800;
        line-height: 1.1;
        overflow-wrap: anywhere;
      }

      .unit-time-status {
        color: var(--muted);
        font-size: 14px;
      }

      .time-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .time-note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .time-message {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .time-card {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .header {
          align-items: flex-start;
          flex-direction: column;
        }

        .header-title {
          font-size: 24px;
        }

        .controls {
          width: 100%;
        }

        .header-right {
          width: 100%;
          justify-items: stretch;
        }

        .clock {
          text-align: left;
        }

        .status {
          margin-left: auto;
        }

        .chart-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .time-actions {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <div class="header-left">
          <img src="/static/Bard-Web-Logos/bard-logo-red.png" alt="Bard logo" />
          <h1 class="header-title">{{ title }}</h1>
        </div>
        <div class="header-right">
          <div class="clock">
            <div id="clock-local">--:--:--</div>
            <div class="clock-utc" id="clock-utc">UTC --</div>
          </div>
          <div class="controls">
            <button class="button-start" type="button" id="start-button">Start</button>
            <button type="button" id="stop-button">Stop</button>
            <div class="status status-stopped" id="run-status">Stopped</div>
          </div>
        </div>
      </div>

      <div class="grid">
        <section class="card chart-panel">
          <div class="chart-header">
            <h2 class="chart-title">Total radiation</h2>
            <div class="reading"><span id="total-value">—</span> W/m²</div>
          </div>
          <div class="chart-wrap">
            <canvas id="total-chart"></canvas>
          </div>
        </section>

        <section class="card chart-panel">
          <div class="chart-header">
            <h2 class="chart-title">Diffuse radiation</h2>
            <div class="reading"><span id="diffuse-value">—</span> W/m²</div>
          </div>
          <div class="chart-wrap">
            <canvas id="diffuse-chart"></canvas>
          </div>
        </section>

        <section class="card chart-panel">
          <div class="chart-header">
            <h2 class="chart-title">Sunshine</h2>
            <div class="reading"><span id="sun-value">—</span></div>
          </div>
          <div class="chart-wrap">
            <canvas id="sun-chart"></canvas>
          </div>
        </section>

        <section class="card chart-panel time-card">
          <div class="chart-header">
            <h2 class="chart-title">SPN1 Time</h2>
            <div class="reading" id="spn1-time-status">Unavailable</div>
          </div>
          <div class="time-body">
            <div class="unit-time" id="spn1-unit-time">Unavailable</div>
            <div class="unit-time-status" id="spn1-time-result">Waiting for SPN1 time</div>
          </div>
          <div class="time-actions">
            <button type="button" id="spn1-time-sync" title="Stop run before syncing SPN1 time.">Sync to Server Time</button>
            <span class="time-message" id="spn1-time-message">Stop the run before syncing SPN1 time.</span>
          </div>
          <div class="time-note">SPN1 time resets after power loss. Sync when stopped.</div>
        </section>
      </div>
    </div>

    <script>
      const pollIntervalMs = {{ poll_interval_ms }};
      const maxPoints = 100;
      const totalValueEl = document.getElementById("total-value");
      const diffuseValueEl = document.getElementById("diffuse-value");
      const runStatusEl = document.getElementById("run-status");
      const clockLocalEl = document.getElementById("clock-local");
      const clockUtcEl = document.getElementById("clock-utc");
      const spn1UnitTimeEl = document.getElementById("spn1-unit-time");
      const spn1TimeStatusEl = document.getElementById("spn1-time-status");
      const spn1TimeResultEl = document.getElementById("spn1-time-result");
      const spn1TimeMessageEl = document.getElementById("spn1-time-message");
      const spn1TimeSyncButton = document.getElementById("spn1-time-sync");
      const sunValueEl = document.getElementById("sun-value");
      let lastTimestamp = null;
      let runActive = false;

      Chart.defaults.color = "#a7a7a7";
      Chart.defaults.borderColor = "rgba(255, 255, 255, 0.12)";

      function makeChart(canvasId, label, color) {
        return new Chart(document.getElementById(canvasId), {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label,
                data: [],
                borderColor: color,
                backgroundColor: color,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.25,
              },
            ],
          },
          options: {
            animation: false,
            maintainAspectRatio: false,
            responsive: true,
            scales: {
              x: {
                ticks: {
                  maxRotation: 0,
                  autoSkip: true,
                  maxTicksLimit: 8,
                },
              },
              y: {
                beginAtZero: true,
                title: {
                  display: true,
                  text: "W/m²",
                },
              },
            },
            plugins: {
              legend: {
                display: false,
              },
            },
          },
        });
      }

      const totalChart = makeChart("total-chart", "Total radiation", "#58a6ff");
      const diffuseChart = makeChart("diffuse-chart", "Diffuse radiation", "#52d273");
      const sunChart = new Chart(document.getElementById("sun-chart"), {
        type: "line",
        data: {
          labels: [],
          datasets: [
            {
              label: "Sun",
              data: [],
              borderColor: "#f2cc60",
              backgroundColor: "#f2cc60",
              borderWidth: 2,
              pointRadius: 0,
              tension: 0,
              stepped: true,
            },
          ],
        },
        options: {
          animation: false,
          maintainAspectRatio: false,
          responsive: true,
          scales: {
            x: {
              ticks: {
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: 8,
              },
            },
            y: {
              min: 0,
              max: 1,
              ticks: {
                stepSize: 1,
                callback: v => (v === 1 ? "Sun" : "No Sun"),
              },
            },
          },
          plugins: {
            legend: { display: false },
          },
        },
      });


      function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function pushPoint(chart, label, value) {
        chart.data.labels.push(label);
        chart.data.datasets[0].data.push(value);
        if (chart.data.labels.length > maxPoints) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }
        chart.update();
      }

      function updateReading(reading) {
        if (!reading || reading.timestamp === lastTimestamp) return;
        lastTimestamp = reading.timestamp;

        const data = reading.data || {};
        const extended = reading.extended || {};
        const label = formatTime(reading.timestamp);
        if (reading.status !== "ok") return;

        totalValueEl.textContent = Number(data.total_w_m2).toFixed(1);
        diffuseValueEl.textContent = Number(data.diffuse_w_m2).toFixed(1);
        sunValueEl.textContent = data.sun === 1 ? "Sun" : "No sun";
        pushPoint(totalChart, label, data.total_w_m2);
        pushPoint(diffuseChart, label, data.diffuse_w_m2);
        pushPoint(sunChart, label, data.sun);
        updateSpn1TimeFromReading(reading, extended);
      }

      async function setRunActive(active) {
        await fetch(active ? "/start" : "/stop", { method: "POST" });
        await refreshState();
      }

      function showRunState(runActive) {
        runStatusEl.textContent = runActive ? "Running" : "Stopped";
        runStatusEl.classList.toggle("status-running", runActive);
        runStatusEl.classList.toggle("status-stopped", !runActive);
        spn1TimeSyncButton.disabled = runActive;
        spn1TimeSyncButton.title = runActive ? "Stop run before syncing SPN1 time." : "";
        spn1TimeMessageEl.textContent = runActive ? "Stop the run before syncing SPN1 time." : "";
      }

      async function refreshState() {
        const response = await fetch("/state");
        const state = await response.json();
        runActive = Boolean(state.run_active);
        showRunState(runActive);
        updateReading(state.latest_reading);
      }

      async function refreshTime() {
        const response = await fetch("/time");
        const time = await response.json();
        clockLocalEl.textContent = time.local || "--:--:--";
        clockUtcEl.textContent = `UTC ${time.utc || "--"}`;
      }

      function updateSpn1TimeFromReading(reading, extended) {
        const spn1Time = extended.spn1_time_local || extended.spn1_time || null;
        if (spn1Time) {
          spn1UnitTimeEl.textContent = spn1Time;
          spn1TimeStatusEl.textContent = "Available";
          spn1TimeResultEl.textContent = "Updated with latest reading";
          return;
        }

        if (reading.timestamp) {
          spn1UnitTimeEl.textContent = new Date(reading.timestamp).toLocaleString();
          spn1TimeStatusEl.textContent = "Server timestamp";
          spn1TimeResultEl.textContent = "No SPN1 timestamp in latest reading";
          return;
        }

        spn1UnitTimeEl.textContent = "Unavailable";
        spn1TimeStatusEl.textContent = "Unavailable";
        spn1TimeResultEl.textContent = "Unavailable";
      }

      function showDeviceTime(payload) {
        const parsed = Boolean(payload && payload.parsed);
        const unitTime = parsed ? payload.device_time_local : null;
        spn1TimeStatusEl.textContent = parsed ? "Available" : "Unavailable";
        spn1UnitTimeEl.textContent = unitTime || "Unavailable";
        spn1TimeResultEl.textContent = parsed ? "SPN1 clock refreshed after sync" : "Unavailable";
      }

      async function refreshSpn1Time() {
        const response = await fetch("/spn1/time");
        const payload = await response.json();
        showDeviceTime(payload);
      }

      async function syncSpn1Time() {
        if (runActive) {
          spn1TimeMessageEl.textContent = "Stop the run before syncing SPN1 time.";
          return;
        }
        spn1TimeMessageEl.textContent = "Syncing...";
        const response = await fetch("/spn1/time/sync", { method: "POST" });
        const payload = await response.json();
        if (!response.ok) {
          spn1TimeMessageEl.textContent = payload.detail || "Sync failed.";
          return;
        }
        spn1TimeMessageEl.textContent = payload.status === "ok" ? "Sync complete." : "Sync failed.";
        await refreshSpn1Time();
      }

      document.getElementById("start-button").addEventListener("click", () => {
        setRunActive(true).catch(console.error);
      });

      document.getElementById("stop-button").addEventListener("click", () => {
        setRunActive(false).catch(console.error);
      });

      spn1TimeSyncButton.addEventListener("click", () => {
        syncSpn1Time().catch(console.error);
      });

      refreshState().catch(console.error);
      setInterval(() => {
        refreshState().catch(console.error);
      }, pollIntervalMs);

      refreshTime().catch(console.error);
      setInterval(() => {
        refreshTime().catch(console.error);
      }, 1000);

    </script>
  </body>
</html>
