<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #050505;
        --panel: #111111;
        --panel-border: #2f2f2f;
        --text: #f5f5f5;
        --muted: #a7a7a7;
        --accent: #58a6ff;
        --accent-2: #52d273;
        --danger: #c9232d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 20px 40px;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 0;
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .header-left img {
        height: 52px;
        width: auto;
      }

      .header-title {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-right {
        display: grid;
        justify-items: end;
        gap: 8px;
      }

      .clock {
        white-space: nowrap;
        text-align: right;
        font-size: 17px;
        color: rgba(255, 255, 255, 0.86);
      }

      .clock-utc {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      button {
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px 16px;
        color: var(--text);
        background: #171717;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        border-color: rgba(255, 255, 255, 0.35);
      }

      .button-start {
        background: var(--danger);
        border-color: var(--danger);
      }

      .status {
        min-width: 88px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 14px;
        font-weight: 700;
        text-align: right;
      }

      .status-running {
        color: var(--accent-2);
      }

      .status-stopped {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .chart-panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 20px;
      }

      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 14px;
      }

      .chart-title {
        margin: 0;
        font-size: 20px;
      }

      .reading {
        color: var(--muted);
        font-size: 15px;
        white-space: nowrap;
      }

      .chart-wrap {
        position: relative;
        height: 300px;
      }

      .time-card {
        display: flex;
        min-height: 300px;
        flex-direction: column;
      }

      .time-body {
        display: grid;
        flex: 1;
        align-content: center;
        justify-items: center;
        gap: 10px;
        text-align: center;
      }

      .unit-time {
        font-size: 36px;
        font-weight: 800;
        line-height: 1.1;
        overflow-wrap: anywhere;
      }

      .unit-time-status {
        color: var(--muted);
        font-size: 14px;
      }

      .time-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .time-note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .time-message {
        color: var(--muted);
        font-size: 14px;
      }

      .device-section {
        margin-top: 24px;
      }

      .section-title {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .wifi-grid {
        display: grid;
        align-items: start;
        gap: 16px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .wifi-card {
        display: grid;
        min-width: 0;
        align-content: start;
        gap: 12px;
        padding: 16px;
      }

      .wifi-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .wifi-uid {
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .wifi-badge {
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .wifi-status-online {
        color: var(--accent-2);
      }

      .wifi-status-offline {
        color: var(--danger);
      }

      .wifi-status-stopped,
      .wifi-status-waiting,
      .wifi-status-catchup {
        color: var(--muted);
      }

      .panel-voltage-list {
        display: grid;
        gap: 8px;
      }

      .panel-voltage-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding-top: 8px;
      }

      .panel-voltage-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .panel-voltage-value {
        color: var(--text);
        font-size: 20px;
        font-weight: 800;
        line-height: 1.1;
        white-space: nowrap;
      }

      .wifi-details {
        display: grid;
        gap: 8px;
      }

      .wifi-details details {
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding-top: 8px;
      }

      .wifi-details summary {
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        list-style-position: inside;
      }

      .wifi-detail-grid {
        display: grid;
        gap: 7px;
        margin-top: 8px;
      }

      .wifi-detail-row {
        display: grid;
        grid-template-columns: minmax(90px, auto) minmax(0, 1fr);
        gap: 10px;
      }

      .wifi-detail-label {
        color: var(--muted);
        font-size: 12px;
      }

      .wifi-detail-value {
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 1200px) {
        .wifi-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 900px) {
        .wifi-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .wifi-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .time-card {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .header {
          align-items: flex-start;
          flex-direction: column;
        }

        .header-title {
          font-size: 24px;
        }

        .controls {
          width: 100%;
        }

        .header-right {
          width: 100%;
          justify-items: stretch;
        }

        .clock {
          text-align: left;
        }

        .status {
          margin-left: auto;
        }

        .chart-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .time-actions {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <div class="header-left">
          <img src="/static/Bard-Web-Logos/bard-logo-red.png" alt="Bard logo" />
          <h1 class="header-title">{{ title }}</h1>
        </div>
        <div class="header-right">
          <div class="clock">
            <div id="clock-local">--:--:--</div>
            <div class="clock-utc" id="clock-utc">UTC --</div>
          </div>
          <div class="controls">
            <button class="button-start" type="button" id="start-button">Start</button>
            <button type="button" id="stop-button">Stop</button>
            <div class="status status-stopped" id="run-status">Stopped</div>
          </div>
        </div>
      </div>

      <div class="grid">
        <section class="card chart-panel">
          <div class="chart-header">
            <h2 class="chart-title">Total radiation</h2>
            <div class="reading"><span id="total-value">—</span> W/m²</div>
          </div>
          <div class="chart-wrap">
            <canvas id="total-chart"></canvas>
          </div>
        </section>

        <section class="card chart-panel">
          <div class="chart-header">
            <h2 class="chart-title">Diffuse radiation</h2>
            <div class="reading"><span id="diffuse-value">—</span> W/m²</div>
          </div>
          <div class="chart-wrap">
            <canvas id="diffuse-chart"></canvas>
          </div>
        </section>

        <section class="card chart-panel">
          <div class="chart-header">
            <h2 class="chart-title">Sunshine</h2>
            <div class="reading"><span id="sun-value">—</span></div>
          </div>
          <div class="chart-wrap">
            <canvas id="sun-chart"></canvas>
          </div>
        </section>
      </div>

      <section class="device-section" aria-labelledby="bardbox-node-title">
        <h2 class="section-title" id="bardbox-node-title">BardBox Wi-Fi Nodes</h2>
        <div class="wifi-grid" id="wifi-node-list"></div>
      </section>
    </div>

    <script>
      const pollIntervalMs = {{ poll_interval_ms }};
      const configuredSolarNodes = {{ configured_wifi_nodes | tojson }};
      const maxPoints = 100;
      const totalValueEl = document.getElementById("total-value");
      const diffuseValueEl = document.getElementById("diffuse-value");
      const runStatusEl = document.getElementById("run-status");
      const clockLocalEl = document.getElementById("clock-local");
      const clockUtcEl = document.getElementById("clock-utc");
      const sunValueEl = document.getElementById("sun-value");
      const wifiNodeListEl = document.getElementById("wifi-node-list");
      const expectedSolarNodeUids = [
        "bb-solar-pnl-001",
        "bb-solar-pnl-002",
        "bb-solar-pnl-003",
        "bb-solar-pnl-004",
      ];
      const openSolarDetails = new Set();
      let lastSpn1Timestamp = null;
      let runActive = false;

      Chart.defaults.color = "#a7a7a7";
      Chart.defaults.borderColor = "rgba(255, 255, 255, 0.12)";

      function makeChart(canvasId, label, color) {
        return new Chart(document.getElementById(canvasId), {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label,
                data: [],
                borderColor: color,
                backgroundColor: color,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.25,
              },
            ],
          },
          options: {
            animation: false,
            maintainAspectRatio: false,
            responsive: true,
            scales: {
              x: {
                ticks: {
                  maxRotation: 0,
                  autoSkip: true,
                  maxTicksLimit: 8,
                },
              },
              y: {
                beginAtZero: true,
                title: {
                  display: true,
                  text: "W/m²",
                },
              },
            },
            plugins: {
              legend: {
                display: false,
              },
            },
          },
        });
      }

      const totalChart = makeChart("total-chart", "Total radiation", "#58a6ff");
      const diffuseChart = makeChart("diffuse-chart", "Diffuse radiation", "#52d273");
      const sunChart = new Chart(document.getElementById("sun-chart"), {
        type: "line",
        data: {
          labels: [],
          datasets: [
            {
              label: "Sun",
              data: [],
              borderColor: "#f2cc60",
              backgroundColor: "#f2cc60",
              borderWidth: 2,
              pointRadius: 0,
              tension: 0,
              stepped: true,
            },
          ],
        },
        options: {
          animation: false,
          maintainAspectRatio: false,
          responsive: true,
          scales: {
            x: {
              ticks: {
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: 8,
              },
            },
            y: {
              min: 0,
              max: 1,
              ticks: {
                stepSize: 1,
                callback: v => (v === 1 ? "Sun" : "No Sun"),
              },
            },
          },
          plugins: {
            legend: { display: false },
          },
        },
      });


      function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function pushPoint(chart, label, value) {
        chart.data.labels.push(label);
        chart.data.datasets[0].data.push(value);
        if (chart.data.labels.length > maxPoints) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }
        chart.update();
      }

      function updateSpn1Reading(reading) {
        if (!reading || reading.timestamp === lastSpn1Timestamp) return;
        lastSpn1Timestamp = reading.timestamp;

        const data = reading.data || {};
        const extended = reading.extended || {};
        const label = formatTime(reading.timestamp);
        if (reading.status !== "ok") return;

        totalValueEl.textContent = Number(data.total_w_m2).toFixed(1);
        diffuseValueEl.textContent = Number(data.diffuse_w_m2).toFixed(1);
        sunValueEl.textContent = data.sun === 1 ? "Sun" : "No sun";
        pushPoint(totalChart, label, data.total_w_m2);
        pushPoint(diffuseChart, label, data.diffuse_w_m2);
        pushPoint(sunChart, label, data.sun);
      }

      function formatValue(value, suffix = "") {
        if (value === null || value === undefined || value === "") return "—";
        return `${value}${suffix}`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[char]));
      }

      function formatVoltage(value) {
        return typeof value === "number" ? `${value.toFixed(3)} V` : "— V";
      }

      function isSolarNodeReading(reading) {
        const data = reading?.data || {};
        const extended = reading?.extended || {};
        return data.panel_voltage_v !== undefined || extended.node_type === "solar_panel";
      }

      function formatVoltageOk(value) {
        if (value === 1 || value === true) return "OK";
        if (value === 0 || value === false) return "NOT OK";
        return "—";
      }

      function getPanelVoltages(data) {
        return [
          data.panel_voltage_1_v ?? data.panel_voltage_v ?? null,
          data.panel_voltage_2_v ?? null,
          data.panel_voltage_3_v ?? null,
          data.panel_voltage_4_v ?? null,
        ];
      }

      function mergeSolarNodes(readings) {
        const nodesByUid = new Map();

        expectedSolarNodeUids.forEach((uid) => {
          nodesByUid.set(uid, { configured: { uid }, reading: null });
        });

        (configuredSolarNodes || []).forEach((node) => {
          if (!node.uid) return;
          const existing = nodesByUid.get(node.uid) || { configured: {}, reading: null };
          existing.configured = { ...existing.configured, ...node };
          nodesByUid.set(node.uid, existing);
        });

        (readings || []).filter(isSolarNodeReading).forEach((reading) => {
          if (!reading.uid) return;
          const existing = nodesByUid.get(reading.uid) || { configured: { uid: reading.uid }, reading: null };
          existing.reading = reading;
          nodesByUid.set(reading.uid, existing);
        });

        return Array.from(nodesByUid.values()).sort((a, b) =>
          String(a.configured.uid || a.reading?.uid || "").localeCompare(String(b.configured.uid || b.reading?.uid || ""))
        );
      }

      function nodeState(reading) {
        if (!runActive) return "STOPPED";
        if (!reading) return "WAITING";
        if (reading.status === "ok") return "LIVE";
        return "OFFLINE";
      }

      function stateClass(state) {
        return {
          STOPPED: "wifi-status-stopped",
          WAITING: "wifi-status-waiting",
          LIVE: "wifi-status-online",
          OFFLINE: "wifi-status-offline",
          CATCHUP: "wifi-status-catchup",
        }[state] || "wifi-status-waiting";
      }

      function detailRow(label, value) {
        return `
          <div class="wifi-detail-row">
            <div class="wifi-detail-label">${escapeHtml(label)}</div>
            <div class="wifi-detail-value">${escapeHtml(formatValue(value))}</div>
          </div>
        `;
      }

      function detailKey(uid, section) {
        return `${uid}:${section}`;
      }

      function captureSolarDetailOpenState() {
        wifiNodeListEl.querySelectorAll("details[data-detail-key]").forEach((detail) => {
          const key = detail.dataset.detailKey;
          if (!key) return;
          if (detail.open) {
            openSolarDetails.add(key);
          } else {
            openSolarDetails.delete(key);
          }
        });
      }

      function restoreSolarDetailOpenState() {
        wifiNodeListEl.querySelectorAll("details[data-detail-key]").forEach((detail) => {
          const key = detail.dataset.detailKey;
          detail.open = openSolarDetails.has(key);
          detail.addEventListener("toggle", () => {
            if (detail.open) {
              openSolarDetails.add(key);
            } else {
              openSolarDetails.delete(key);
            }
          });
        });
      }

      function renderWifiNodes(readings) {
        captureSolarDetailOpenState();
        const cards = mergeSolarNodes(readings);
        if (!cards.length) {
          wifiNodeListEl.innerHTML = '<section class="card chart-panel wifi-card"><div class="reading">No BardBox solar node readings yet.</div></section>';
          return;
        }

        wifiNodeListEl.innerHTML = cards.map(({ configured, reading }) => {
          const data = reading?.data || {};
          const extended = reading?.extended || {};
          const state = nodeState(reading);
          const statusClass = stateClass(state);
          const error = reading?.status === "error" ? extended.error : null;
          const firmware = extended.fw || extended.firmware;
          const rssi = extended.rssi_dbm;
          const nodeModel = extended.node_model;
          const ipAddress = extended.ip;
          const uid = configured.uid || reading?.uid || "Unknown UID";
          const timestamp = reading?.timestamp ? new Date(reading.timestamp).toLocaleString() : "—";
          const panelVoltages = state === "LIVE" ? getPanelVoltages(data) : [null, null, null, null];
          const errorMarkup = error ? `<div class="time-message">${escapeHtml(error)}</div>` : "";

          return `
            <section class="card chart-panel wifi-card">
              <div class="wifi-card-header">
                <div class="wifi-uid">${escapeHtml(uid)}</div>
                <div class="wifi-badge ${statusClass}">${escapeHtml(state)}</div>
              </div>
              <div class="wifi-details">
                <details data-detail-key="${escapeHtml(detailKey(uid, "identity"))}">
                  <summary>Identity</summary>
                  <div class="wifi-detail-grid">
                    ${detailRow("Node type", extended.node_type)}
                    ${detailRow("Node model", nodeModel)}
                    ${detailRow("Firmware", firmware)}
                    ${detailRow("Protocol", extended.protocol)}
                    ${detailRow("IP address", ipAddress || configured.host)}
                    ${detailRow("MAC address", extended.mac)}
                  </div>
                </details>
                <details data-detail-key="${escapeHtml(detailKey(uid, "health"))}">
                  <summary>Health</summary>
                  <div class="wifi-detail-grid">
                    ${detailRow("Voltage OK", formatVoltageOk(extended.voltage_ok))}
                    ${detailRow("RSSI", rssi === undefined ? null : `${rssi} dBm`)}
                    ${detailRow("Last updated", timestamp)}
                    ${detailRow("Current state", state)}
                    ${error ? detailRow("Error", error) : ""}
                  </div>
                </details>
                <details data-detail-key="${escapeHtml(detailKey(uid, "hardware"))}">
                  <summary>Hardware</summary>
                  <div class="wifi-detail-grid">
                    ${detailRow("Sensor count", extended.sensor_count)}
                    ${detailRow("ADC", extended.adc)}
                    ${detailRow("Sensors", extended.sensors)}
                  </div>
                </details>
                <details data-detail-key="${escapeHtml(detailKey(uid, "panel-readings"))}">
                  <summary>Panel Readings</summary>
                  <div class="panel-voltage-list">
                    ${panelVoltages.map((value, index) => `
                      <div class="panel-voltage-row">
                        <div class="panel-voltage-label">Panel ${index + 1}</div>
                        <div class="panel-voltage-value">${escapeHtml(formatVoltage(value))}</div>
                      </div>
                    `).join("")}
                  </div>
                </details>
              </div>
              ${errorMarkup}
            </section>
          `;
        }).join("");
        restoreSolarDetailOpenState();
      }

      async function setRunActive(active) {
        await fetch(active ? "/start" : "/stop", { method: "POST" });
        await refreshState();
        await refreshWifiNodes();
      }

      function showRunState(runActive) {
        runStatusEl.textContent = runActive ? "Running" : "Stopped";
        runStatusEl.classList.toggle("status-running", runActive);
        runStatusEl.classList.toggle("status-stopped", !runActive);
      }

      async function refreshState() {
        const stateResponse = await fetch("/state");
        const state = await stateResponse.json();
        runActive = Boolean(state.run_active);
        showRunState(runActive);
        updateSpn1Reading(state.latest_spn1_reading);
      }

      async function refreshWifiNodes() {
        const response = await fetch("/readings/latest");
        const payload = await response.json();
        renderWifiNodes(Array.isArray(payload.readings) ? payload.readings : []);
      }

      async function refreshTime() {
        const response = await fetch("/time");
        const time = await response.json();
        clockLocalEl.textContent = time.local || "--:--:--";
        clockUtcEl.textContent = `UTC ${time.utc || "--"}`;
      }

      document.getElementById("start-button").addEventListener("click", () => {
        setRunActive(true).catch(console.error);
      });

      document.getElementById("stop-button").addEventListener("click", () => {
        setRunActive(false).catch(console.error);
      });

      refreshState().catch(console.error);
      refreshWifiNodes().catch(console.error);

      setInterval(() => {
        refreshState().catch(console.error);
      }, pollIntervalMs);

      setInterval(() => {
        refreshWifiNodes().catch(console.error);
      }, pollIntervalMs);

      refreshTime().catch(console.error);
      setInterval(() => {
        refreshTime().catch(console.error);
      }, 1000);

    </script>
  </body>
</html>
